name: Deploy OpenDigitizer to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: |
          npm ci
          python -m pip install --upgrade pip
          pip install jinja2 Babel

      - name: Build (bundle JS + render HTML)
        run: npm run build

      - name: Assemble static site
        run: |
          rm -rf _site && mkdir -p _site
          # entry pages (index.html is the default) + minified bundle
          cp index*.html _site/
          cp wpd.min.js _site/
          # static assets
          cp favicon.ico start.png _site/ 2>/dev/null || true
          cp -r styles images _site/
          # third-party assets referenced by the page at runtime
          mkdir -p _site/node_modules/bootstrap-icons/font \
                   _site/node_modules/pdfjs-dist/build \
                   _site/node_modules/tarballjs
          cp -r node_modules/bootstrap-icons/font/. _site/node_modules/bootstrap-icons/font/
          cp -r node_modules/pdfjs-dist/build/.     _site/node_modules/pdfjs-dist/build/
          cp -r node_modules/tarballjs/.            _site/node_modules/tarballjs/
          # serve files as-is (don't run Jekyll)
          touch _site/.nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
